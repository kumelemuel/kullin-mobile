schema: spec-driven

context: |
  # Kullin - Offline-First Mobile + Local API Monorepo

  ## Tech Stack
  - npm workspaces: apps/mobile, apps/api, packages/contracts
  - Expo SDK 57 (managed), React Native 0.86, React 19, TypeScript 6 (strict)
  - Realm (mobile) for local persistence; Zustand for UI state
  - Fastify 5 API with ActualBudgetPort adapter stub
  - OpenAPI in packages/contracts (openapi-typescript codegen)
  - Axios + JWT interceptor on mobile; Expo Router; EAS Build

  ## Architecture Principles
  - Offline-first on mobile: Realm + PendingOperation queue
  - Mobile talks only to Kullin API; Actual Budget secrets stay on the API
  - Health: GET /api/health → 200 starts sync processing
  - Specs drive implementation; OpenAPI is HTTP contract source of truth

  ## Key Directories
  - apps/mobile/src/core/ - API client, network monitor
  - apps/mobile/src/db/ - Realm config, models, repositories
  - apps/mobile/src/features/ - Domain features
  - apps/mobile/src/services/ - queue.service, sync.service
  - apps/mobile/app/ - Expo Router pages
  - apps/api/src/ - Fastify app, modules, actual port/stub
  - packages/contracts/ - OpenAPI + generated types

  ## Quality Gates
  - npm run typecheck (all workspaces)
  - npm run lint
  - npm run test (Jest mobile + Vitest API)
  - npm run generate:api after OpenAPI changes

  ## Conventions
  - Conventional Commits (feat:, fix:, chore:)
  - Mobile path aliases: @/*, @core/*, @db/*, @features/*, @services/*
  - Realm models PascalCase; queue ops create/update/delete

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include "Non-goals" section
    - Reference existing specs in openspec/specs/
  design:
    - Include data model changes (Realm schema updates)
    - Specify queue operation types for new entities
    - Define sync priority and conflict strategy
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be verifiable (test or manual check)
    - Mark tasks that require backend changes
  apply:
    - Follow existing code patterns in apps/mobile/src/ and apps/api/src/
    - Update living specs in openspec/specs/ after implementation
    - Run typecheck + lint before marking tasks complete
    - Update packages/contracts OpenAPI before adding API endpoints
